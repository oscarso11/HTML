<!DOCTYPE html>
<html>
<head>
    <title>Meta Makers</title>
    <style>
        body {
            color: azure;
            background-color: black;
            margin: 0;
            font-family: sans-serif;
        }

        .banner {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }

        .row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 15px;
            padding: 20px;
        }

        .unit-slot {
            width: 100px; 
            height: 100px; 
            border: 3px solid white; 
            border-radius: 10px;
            cursor: pointer;
            transition: border-color 0.2s;
            object-fit: cover;
        }

        .unit-slot:hover {
            border-color: azure;
        }

        .broken-image {
            opacity: 0.6 !important;
            position: relative;
        }

        .broken-image::after {
            content: '❌';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            color: #ff4444;
            z-index: 10;
            background: rgba(0,0,0,0.7);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .slot-container {
            position: relative;
            width: 100px;
            height: 100px;
            display: inline-block;
            transition: transform 0.2s;
        }

        .slot-container:hover {
            transform: scale(1.05);
        }

        .slot-container .unit-slot {
            width: 100%;
            height: 100%;
        }

        .slot-container .enchant-badge {
            position: absolute;
            top: 6px;
            right: 0px;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: transparent;
            border: none;
            display: none;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            z-index: 5;
        }

        .slot-container .enchant-badge img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        .slot-container .enchant-badge.visible {
            display: flex;
        }

        .slot-container .element-badge {
            position: absolute;
            bottom: -20px;
            left: -14px;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: transparent;
            border: none;
            display: none;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            z-index: 5;
            font-size: 15px;
            font-weight: bold;
            color: white;
        }

        .slot-container .element-badge img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        .slot-container .element-badge.visible {
            display: flex;
        }



        .delete-btn {
            position: absolute;
            top: -8px;
            left: -8px;
            width: 28px;
            height: 28px;
            background: #ff4d4d;
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 18px;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .info-btn {
            position: absolute;
            top: -8px;
            right: -8px;
            width: 28px;
            height: 28px;
            background: #4d4dff;
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 16px;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10;
            font-weight: bold;
        }

        .delete-team-btn:hover {
            background: #ff2222;
        }

        .slot-container.filled:hover .delete-btn {
            display: flex;
        }

        .slot-container.filled:hover .info-btn {
            display: flex;
        }

        .overlay-style {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85); 
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .popup-box {
            background: #000000;
            padding: 40px;
            border-radius: 15px;
            border: 1px solid #444;
            text-align: center;
            min-width: 75%;
            max-height: 90vh;
            overflow: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        #UnitSelection .popup-box {
            width: 90%;
            max-width: none;
            height: 90vh;
            min-width: unset;
            max-height: unset;
        }

        .popup-box::-webkit-scrollbar {
            display: none;
        }

        .close-btn {
            margin-top: 15px;
            padding: 10px 20px;
            background: #ff4d4d;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .popup-close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 40px;
            height: 40px;
            background: #ff4d4d;
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 28px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .popup-close-btn:hover {
            background: #ff2222;
        }

        .toggle-slider {
            display: inline-flex;
            background: #333;
            border: 2px solid #666;
            border-radius: 25px;
            padding: 4px;
            cursor: pointer;
            user-select: none;
            position: relative;
            width: 180px;
            height: 40px;
            tabindex: 0;
        }

        .toggle-option {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #aaa;
            z-index: 2;
            transition: color 0.3s;
            pointer-events: none;
        }

        .toggle-slider:focus {
            outline: none;
            box-shadow: none;
        }

        .toggle-indicator {
            position: absolute;
            width: 50%;
            height: calc(100% - 8px);
            background: rgba(0, 0, 0, 0.5);
            border-radius: 20px;
            left: 4px;
            top: 4px;
            transition: left 0.3s ease;
            z-index: 1;
            pointer-events: none;
        }

        .toggle-slider.shiny .toggle-indicator {
            left: calc(50% + 4px);
        }

        .toggle-slider.shiny .toggle-option:first-child {
            color: #aaa;
        }

        .toggle-slider.shiny .toggle-option:last-child {
            color: #FFD700;
        }

        .toggle-slider .toggle-option:first-child {
            color: #00D7FF;
        }

        .toggle-slider.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }

        .element-slider {
            display: inline-flex;
            background: #333;
            border: 2px solid #666;
            border-radius: 8px;
            padding: 0;
            cursor: pointer;
            user-select: none;
            gap: 0;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            max-width: 900px;
        }

        .element-option {
            flex: 0 1 auto;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #aaa;
            transition: color 0.3s, background-color 0.3s;
            border: 1px solid transparent;
            min-width: fit-content;
        }

        .element-option:hover {
            background-color: rgba(100, 100, 100, 0.3);
        }

        .element-option.active {
            color: #00D7FF;
            background-color: rgba(0, 215, 255, 0.2);
        }

        .enchant-table {
            width: fit-content;
            border-collapse: collapse;
            margin: 10px auto 0;
        }

        .enchant-table td {
            padding: 8px;
            vertical-align: middle;
            text-align: center;
        }

        .enchant-btn {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            border: 2px solid #444;
            background: #111;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
        }

        .enchant-btn.selected {
            border-color: #FFD700;
            transform: scale(1.05);
        }

        .enchant-btn img {
            width: 90%;
            height: 90%;
            object-fit: cover;
            border-radius: 50%;
        }

        .enchant-label {
            margin-top: 6px;
            font-size: 12px;
            color: azure;
            text-align: center;
        }

        .passive-box {
            background: rgba(50, 50, 80, 0.6);
            border: 1px solid #666;
            border-radius: 8px;
            padding: 12px;
            margin: 20px 0;
            text-align: left;
            display: none;
            max-width: 100%;
        }

        .passive-box.visible {
            display: block;
        }

        .passive-box h4 {
            margin: 0 0 8px 0;
            color: #FFD700;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .passive-box p {
            margin: 0;
            font-size: 13px;
            color: azure;
            line-height: 1.5;
            white-space: pre-wrap;
            word-wrap: break-word;
            word-break: break-word;
            overflow-wrap: break-word;
        }

        .actives-box {
            background: rgba(80, 50, 50, 0.6);
            border: 1px solid #666;
            border-radius: 8px;
            padding: 12px;
            max-width: 100%;
            margin: 20px 0;
            text-align: left;
            display: none;
        }

        .actives-box.visible {
            display: block;
        }

        .actives-box h4 {
            margin: 0 0 8px 0;
            color: #FF6B6B;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .actives-box p {
            margin: 0;
            font-size: 13px;
            color: azure;
            line-height: 1.5;
            white-space: pre-wrap;
            word-wrap: break-word;
            word-break: break-word;
            overflow-wrap: break-word;
        }

        #unitGrid::-webkit-scrollbar {
            width: 0px;
        }

        #unitGrid::-webkit-scrollbar-track {
            background: transparent;
        }

        #unitGrid::-webkit-scrollbar-thumb {
            background: transparent;
        }

        #unitGrid {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
    </style>
</head>

        <div style="display: flex; gap: 20px;">

            <button onclick="location.href='Units.html'" style="background: transparent; color: white; border: none; cursor: pointer; font-size: 16px;">Units</button>

    <img src="images/MetaMakers.png" class="banner" alt="Meta Makers Banner">

<div style="text-align: center; width: 100%;">

                <div class="slot-container"><img src="images/Plus.png" class="unit-slot" onclick="openGrid(this)" onerror="this.classList.add('broken-image'); console.error('Slot img failed:', this.src);"><div class="enchant-badge"></div><div class="element-badge"></div><button class="delete-btn" onclick="clearSlot(event)">×</button><button class="info-btn" onclick="showUnitInfo(event)">i</button></div>
                <div class="slot-container"><img src="images/Plus.png" class="unit-slot" onclick="openGrid(this)" onerror="this.classList.add('broken-image'); console.error('Slot img failed:', this.src);"><div class="enchant-badge"></div><div class="element-badge"></div><button class="delete-btn" onclick="clearSlot(event)">×</button><button class="info-btn" onclick="showUnitInfo(event)">i</button></div>
                <div class="slot-container"><img src="images/Plus.png" class="unit-slot" onclick="openGrid(this)" onerror="this.classList.add('broken-image'); console.error('Slot img failed:', this.src);"><div class="enchant-badge"></div><div class="element-badge"></div><button class="delete-btn" onclick="clearSlot(event)">×</button><button class="info-btn" onclick="showUnitInfo(event)">i</button></div>
                <div class="slot-container"><img src="images/Plus.png" class="unit-slot" onclick="openGrid(this)" onerror="this.classList.add('broken-image'); console.error('Slot img failed:', this.src);"><div class="enchant-badge"></div><div class="element-badge"></div><button class="delete-btn" onclick="clearSlot(event)">×</button><button class="info-btn" onclick="showUnitInfo(event)">i</button></div>
                <div class="slot-container"><img src="images/Plus.png" class="unit-slot" onclick="openGrid(this)" onerror="this.classList.add('broken-image'); console.error('Slot img failed:', this.src);"><div class="enchant-badge"></div><div class="element-badge"></div><button class="delete-btn" onclick="clearSlot(event)">×</button><button class="info-btn" onclick="showUnitInfo(event)">i</button></div>

    <div id="UnitDetail" class="overlay-style">

    <script>


let slot = null;
        let units = null;
let selectedElement = 'All';
let selectedTags = [];
let unitTags = {};
        let selectedUnitName = null;
        let selectedUnitImg = null;
        let isShinySelected = false;
let selectedEnchantName = 'None';
let nextTeamNumber = 2;

async function loadUnitTags() {
            const response = await fetch('./UnitTags.json');
            const text = await response.text();
            try {
                unitTags = JSON.parse(text);
                console.log('UnitTags loaded:', Object.keys(unitTags).length, 'units');
            } catch (e) {
                console.error('JSON parse failed:', e);
                unitTags = {};
            }
            populateTagFilters();
        }

function populateTagFilters() {
            console.log('populateTagFilters called - unitTags keys:', Object.keys(unitTags).length);
            const tagFilter = document.getElementById('tagFilter');
            if (!tagFilter) {
                console.error('tagFilter element not found');
                return;
            }
            console.log('Clearing tagFilter');
            tagFilter.innerHTML = '<div class="element-option active" data-tag="All" onclick="selectTag(this)">All</div>';
            
            const uniqueTags = new Set();
            Object.values(unitTags).forEach(unit => {
                if (unit.Tags && Array.isArray(unit.Tags)) {
                    unit.Tags.forEach(tag => uniqueTags.add(tag));
                }
            });
            console.log('Unique tags found:', Array.from(uniqueTags));
            
            uniqueTags.forEach(tag => {
                const option = document.createElement('div');
                option.className = 'element-option';
                option.dataset.tag = tag;
                option.textContent = tag;
                option.onclick = () => selectTag(option);
                tagFilter.appendChild(option);
            });
            
            console.log('Tag filters populated:', uniqueTags.size, 'unique tags');
        }
        let selectedEnchantImg = '';

const elementColors = {
            'Neutral': '#A9A9A9',
            'Nature': '#228B22',
            'Fire': '#FF4500',
            'Water': '#1E90FF',
            'Electricity': '#FFD700',
            'Rust': '#8B4513',
            'Light': '#FFFF00',
            'Dark': '#4B0082'
        };

const tagColors = {
    'Stun': '#FF6B6B',
    'DPS': '#FFD700',
    'Slowing': '#00D7FF',
    'Booster': '#4CAF50',
    'Meta': '#FF9800',
    'KnockBack': '#9C27B0'
};

        const elements = {
            'Neutral': 'images/Elements/Neutral.png',
            'Nature': 'images/Elements/Nature.png',
            'Fire': 'images/Elements/Fire.png',
            'Water': 'images/Elements/Water.png',
            'Electricity': 'images/Elements/Electricity.png',
            'Rust': 'images/Elements/Rust.png',
            'Light': 'images/Elements/Light.png',
            'Dark': 'images/Elements/Dark.png',
            'Dark-light': 'images/Elements/Dark-light.png'
        };

        const enchantments = [
            { name: 'Engineer', img: 'images/Enchants/Engineer.png' },
            { name: 'Puppets Nightmare', img: 'images/Enchants/PuppetNightmare.png' },
            { name: 'Investor', img: 'images/Enchants/Investor.png' },
            { name: 'Haywire', img: 'images/Enchants/Haywire.png' },
            { name: 'Phantom', img: 'images/Enchants/Phantom.png' },
            { name: 'Blighted', img: 'images/Enchants/Blighted.png' },
            { name: 'Springlocked', img: 'images/Enchants/Springlocked.png' },
            { name: 'Shadow', img: 'images/Enchants/Shadow.png' },
            { name: 'Vengeance', img: 'images/Enchants/Vengeance.png' },
            { name: 'Champion', img: 'images/Enchants/Champion.png' },
        ];

        const raritySort = {
            'Hero': 1, 'Apex': 2, 'Exclusive': 4, 'Nightmare': 3, 'Secret': 5,
            'Mythical': 6, 'Epic': 7, 'Rare': 8, 'Uncommon': 9, 'Common': 10
        };

        const rarityGradient = {
            'Hero': ['#655b16', '#545626'],
            'Apex': ['#6423a6', '#274ad8'],
            'Exclusive': ['#2fd8ea', '#154874'],
            'Nightmare': ['#3c226f', '#322056'],
            'Secret': ['#ff5905', '#ff2b09'],
            'Mythical': ['#ffd513', '#ffec09'],
            'Epic': ['#d121db', '#a70eb9'],
            'Rare': ['#417ddb', '#2c57b9'],
            'Uncommon': ['#51ff65', '#45ff80']
        };

function sanitizeFilename(name) {
            return name.replace(/ /g, '_').replace(/[^\w'-]/g, '_');
        }

        async function getUnits() {
            try {
                const res = await fetch('https://raw.githubusercontent.com/UGAccount/FNTD2/refs/heads/main/Info');
                const data = await res.json();
                units = data.Units;
                return units;
            } catch (error) {
                console.error('Failed to fetch units:', error);
                return null;
            }
        }

        function createElementBadgeContent(elementName, elementBadge) {
            const elementColor = elementColors[elementName] || '#666666';
            const elementImg = elements[elementName];
            
            if (elementImg) {
                const img = document.createElement('img');
                img.src = elementImg;
                img.alt = elementName;
                img.style.width = '100%';

function selectTag(tagElement) {

                document.querySelectorAll('#tagFilter .element-option').forEach(opt => opt.classList.remove('active'));
                tagElement.classList.add('active');

                    selectedTags.splice(index, 1);

                        const allTag = document.querySelector('#tagFilter [data-tag="All"]');

        function displayActives(unit) {
            const activesBox = document.getElementById('activesBox');
            const activesText = document.getElementById('activesText');
            
            if (unit && unit.Actives && Array.isArray(unit.Actives)) {
                let content = '';
                unit.Actives.forEach((active, index) => {
                    if (index > 0) content += '\n\n';
                    if (active.Name && active.Description) {
                        content += `${active.Name}: ${active.Description}`;
                    }
                });
                
                if (content) {
                    activesText.textContent = content;
                    activesBox.classList.add('visible');
                } else {
                    activesBox.classList.remove('visible');
                    activesText.textContent = '';
                }
            } else {
                activesBox.classList.remove('visible');
                activesText.textContent = '';
            }
        }

        function displayPassives(unit) {
            const passiveBox = document.getElementById('passiveBox');
            const passiveText = document.getElementById('passiveText');
            
            if (unit && unit.Passives && typeof unit.Passives === 'object') {
                let content = '';
                for (const [passiveName, passiveDesc] of Object.entries(unit.Passives)) {
                    if (passiveName.toUpperCase() === 'NO PASSIVE') continue;
                    if (content) content += '\n\n';
                    content += `${passiveName}: ${passiveDesc}`;
                }
                
                if (content) {
                    passiveText.textContent = content;
                    passiveBox.classList.add('visible');
                } else {
                    passiveBox.classList.remove('visible');
                    passiveText.textContent = '';
                }
            } else {
                passiveBox.classList.remove('visible');
                passiveText.textContent = '';
            }
        }

        function toggleShiny(event) {
            if (event) {
                event.preventDefault();
                event.stopPropagation();
            }
            const shinyToggle = document.getElementById('shinyToggle');
            if (shinyToggle.classList.contains('disabled')) return;

            isShinySelected = !isShinySelected;
            if (isShinySelected) {
                shinyToggle.classList.add('shiny');
            } else {
                shinyToggle.classList.remove('shiny');
            }
            if (selectedUnitName) {
                const baseFilename = sanitizeFilename(selectedUnitName) + '.png';
                console.log(`Loading shiny: images/Units/${isShinySelected ? 'Shiny_' : ''}${baseFilename}`);
                selectedUnitImg = `images/Units/${isShinySelected ? 'Shiny_' : ''}${baseFilename}`;
                document.getElementById('detailImg').src = selectedUnitImg + '?t=' + Date.now();
            }
        }

        function attachSliderEvents() {
            const shinyToggle = document.getElementById('shinyToggle');
            if (shinyToggle) {
                shinyToggle.removeAttribute('tabindex');
                shinyToggle.style.outline = 'none';
                const newToggle = shinyToggle.cloneNode(true);
                shinyToggle.parentNode.replaceChild(newToggle, shinyToggle);
                
                const toggle = document.getElementById('shinyToggle');
                toggle.style.outline = 'none';
                toggle.addEventListener('click', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    if (!toggle.classList.contains('disabled')) {
                        toggleShiny(e);
                    }
                });
                toggle.addEventListener('keydown', function(e) {
                    if ((e.key === 'ArrowLeft' || e.key === 'ArrowRight') && !toggle.classList.contains('disabled')) {
                        e.preventDefault();
                        toggleShiny(e);
                    }
                });
            }
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            attachSliderEvents();
        });

        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result 
                ? `${parseInt(result[1], 16)}, ${parseInt(result[2], 16)}, ${parseInt(result[3], 16)}` 
                : '255, 255, 255';
        }

        function serializeTeam() {
    const teamsContainer = document.getElementById('teamsContainer');
    const teamSections = teamsContainer.querySelectorAll('.team-section');
    const teamData = [];
    
    teamSections.forEach((section) => {
        const h1 = section.querySelector('h1');
        const row = section.querySelector('.row[data-team]');
        
        if (h1 && row) {
            const slots = Array.from(row.querySelectorAll('.slot-container')).map(container => {
                const slot = container.querySelector('.unit-slot');
                const enchantBadgeDiv = container.querySelector('.enchant-badge');
                const elementBadgeDiv = container.querySelector('.element-badge');
                return {
                    src: slot.src,
                    alt: slot.alt,
                    dataset: Object.fromEntries(Object.entries(slot.dataset)),
                    style: slot.style.cssText,
                    enchantBadgeInnerHTML: enchantBadgeDiv ? enchantBadgeDiv.innerHTML : '',
                    enchantBadgeVisible: enchantBadgeDiv ? enchantBadgeDiv.classList.contains('visible') : false,
                    elementBadgeInnerHTML: elementBadgeDiv ? elementBadgeDiv.innerHTML : '',
                    elementBadgeVisible: elementBadgeDiv ? elementBadgeDiv.classList.contains('visible') : false,
                    containerClasses: Array.from(container.classList)
                };
            });

            teamData.push({ 
                h1: h1.textContent.trim(),
                slots 
            });
        }
    });
    
    console.log('Serialized', teamData.length, 'teams:', teamData);
    return teamData;
}

    const name = document.getElementById('teamNameInput').value.trim();

    const savedTeams = JSON.parse(localStorage.getItem('savedTeams') || '{}');
    savedTeams[name] = serializeTeam();
    localStorage.setItem('savedTeams', JSON.stringify(savedTeams));
    document.getElementById('teamNameInput').value = '';

function loadTeam() {
    const select = document.getElementById('savedTeamsList');
    const name = select.value;
    if (!name) return;
    
    const savedTeams = JSON.parse(localStorage.getItem('savedTeams') || '{}');
    const teamData = savedTeams[name];
    if (!teamData || !Array.isArray(teamData)) {
        return;
    }
    console.log('Loading team data:', teamData);
    
    const teamsContainer = document.getElementById('teamsContainer');
    const teamSections = teamsContainer.querySelectorAll('.team-section');
    

    teamSections.forEach(section => {
        const row = section.querySelector('.row[data-team]');
        if (row) {
            Array.from(row.querySelectorAll('.slot-container')).forEach(container => {
                const slot = container.querySelector('.unit-slot');
                const enchantBadge = container.querySelector('.enchant-badge');
                const elementBadge = container.querySelector('.element-badge');
                slot.src = 'images/Plus.png';
                slot.alt = '';
                Object.keys(slot.dataset).forEach(key => delete slot.dataset[key]);
                slot.style.cssText = '';
                enchantBadge.classList.remove('visible');
                enchantBadge.innerHTML = '';
                elementBadge.classList.remove('visible');
                elementBadge.innerHTML = '';
                container.classList.remove('filled');
            });
        }
    });
    

    const allTeamSections = Array.from(teamsContainer.querySelectorAll('.team-section'));
    for (let i = 1; i < allTeamSections.length; i++) {
        allTeamSections[i].remove();
    }
    

    const addBtn = document.getElementById('addTeamBtn');
    teamData.forEach((team, teamIndex) => {
        if (teamIndex === 0) {
            const team1Section = teamsContainer.querySelector('.team-section');
            const team1Row = team1Section.querySelector('.row[data-team="1"]');
            const team1H1 = team1Section.querySelector('h1');
            team1H1.textContent = team.h1 || 'Team 1';
            
            team.slots.forEach((slotData, slotIndex) => {
                const container = team1Row.children[slotIndex];
                if (container) {
                    const slot = container.querySelector('.unit-slot');
                    const enchantBadge = container.querySelector('.enchant-badge');
                    const elementBadge = container.querySelector('.element-badge');
                    
                    slot.src = slotData.src || 'images/Plus.png';
                    slot.alt = slotData.alt || '';
                    Object.assign(slot.dataset, slotData.dataset || {});
                    slot.style.cssText = slotData.style || '';
                    

                    if (slotData.enchantBadgeInnerHTML) {
                        enchantBadge.innerHTML = slotData.enchantBadgeInnerHTML;
                    }
                    if (slotData.enchantBadgeVisible) {
                        enchantBadge.classList.add('visible');
                    } else {
                        enchantBadge.classList.remove('visible');
                    }
                    

                    if (slotData.elementBadgeInnerHTML) {
                        elementBadge.innerHTML = slotData.elementBadgeInnerHTML;
                    }
                    if (slotData.elementBadgeVisible) {
                        elementBadge.classList.add('visible');
                    } else {
                        elementBadge.classList.remove('visible');
                    }

                    (slotData.containerClasses || []).forEach(cls => container.classList.add(cls));
                    if (slot.dataset.unitName) container.classList.add('filled');
                }
            });
        } else {
            addTeamFromData(team, teamIndex + 1);
        }
    });
    
    nextTeamNumber = teamData.length + 1;
}

function addTeamFromData(teamData, teamNum) {
    const teamsContainer = document.getElementById('teamsContainer');
    const addBtn = document.getElementById('addTeamBtn');
    
    const templateRow = document.querySelector('.row[data-team="1"]').cloneNode(true);
    
    const newTeamSection = document.createElement('div');
    newTeamSection.className = 'team-section';
    newTeamSection.style.marginBottom = '20px';
    
    const teamHeader = document.createElement('div');
    teamHeader.style.cssText = 'display:flex;align-items:center;justify-content:center;gap:15px;margin-bottom:10px;';
    
    const h1 = document.createElement('h1');
    h1.textContent = teamData.h1 || `Team ${teamNum}`;
    const deleteTeamBtn = document.createElement('button');
    deleteTeamBtn.textContent = '×';
    deleteTeamBtn.className = 'delete-team-btn';
    deleteTeamBtn.style.cssText = 'background:#ff4d4d;color:white;border:none;border-radius:50%;width:30px;height:30px;font-size:18px;cursor:pointer;';
    deleteTeamBtn.onclick = function(e) {
        e.stopPropagation();
        newTeamSection.remove();
        renumberTeams();
    };
    
    teamHeader.appendChild(h1);
    teamHeader.appendChild(deleteTeamBtn);
    newTeamSection.appendChild(teamHeader);
    
    templateRow.dataset.team = teamNum;
    teamData.slots.forEach((slotData, slotIndex) => {
        const container = templateRow.children[slotIndex];
        if (container) {
            const slot = container.querySelector('.unit-slot');
            const enchantBadge = container.querySelector('.enchant-badge');
            const elementBadge = container.querySelector('.element-badge');
            
            slot.src = slotData.src || 'images/Plus.png';
            slot.alt = slotData.alt || '';
            Object.assign(slot.dataset, slotData.dataset || {});
            slot.style.cssText = slotData.style || '';
            
            if (slotData.enchantBadgeInnerHTML) {
                enchantBadge.innerHTML = slotData.enchantBadgeInnerHTML;
            }
            if (slotData.enchantBadgeVisible) {
                enchantBadge.classList.add('visible');
            } else {
                enchantBadge.classList.remove('visible');
            }
            
            if (slotData.elementBadgeInnerHTML) {
                elementBadge.innerHTML = slotData.elementBadgeInnerHTML;
            }
            if (slotData.elementBadgeVisible) {
                elementBadge.classList.add('visible');
            } else {
                elementBadge.classList.remove('visible');
            }

            (slotData.containerClasses || []).forEach(cls => container.classList.add(cls));
            if (slot.dataset.unitName) container.classList.add('filled');
        }
    });
    

    templateRow.querySelectorAll('.unit-slot').forEach(slot => slot.onclick = () => openGrid(slot));
    templateRow.querySelectorAll('.delete-btn').forEach(btn => btn.onclick = e => clearSlot(e));
    templateRow.querySelectorAll('.info-btn').forEach(btn => btn.onclick = e => showUnitInfo(e));
    
    newTeamSection.appendChild(templateRow);
    teamsContainer.insertBefore(newTeamSection, addBtn);
}

function clearTeams() {
    document.querySelectorAll('.slot-container').forEach(container => {
        const slot = container.querySelector('.unit-slot');
        const enchantBadge = container.querySelector('.enchant-badge');
        const elementBadge = container.querySelector('.element-badge');
        slot.src = 'images/Plus.png';
        slot.dataset.unitName = '';
        slot.dataset.isShiny = '';
        slot.dataset.enchantName = '';
        slot.style.background = 'none';
        slot.style.borderColor = 'white';
        slot.style.boxShadow = 'none';
        enchantBadge.classList.remove('visible');
        enchantBadge.innerHTML = '';
        elementBadge.classList.remove('visible');
        elementBadge.innerHTML = '';
        container.classList.remove('filled');
    });
}

function renumberTeams() {
    const teamSections = Array.from(document.querySelectorAll('#teamsContainer > div.team-section'));
    teamSections.forEach((section, index) => {
        const h1 = section.querySelector('h1');
        const row = section.querySelector('.row');
        if (h1 && row) {
            const newNumber = index + 1;
            h1.textContent = `Team ${newNumber}`;
            row.dataset.team = newNumber;
        }
    });
    nextTeamNumber = teamSections.length + 1;
}

window.addEventListener('load', async () => {
            await loadUnitTags();
            updateSavedTeamsList();
        });
    </script>
